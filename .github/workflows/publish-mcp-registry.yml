name: Publish to MCP Registry

# Publishes the server to the official MCP Registry at registry.modelcontextprotocol.io.
# Uses GitHub OIDC for authentication — no secrets required, namespace ownership
# verified via GitHub identity (must be in Ask-Cyborg org).
#
# Trigger:
#   - Manual: workflow_dispatch
#   - Automatic: push a tag like v0.1.1

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC auth to MCP Registry
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Verify server.json is present
        run: |
          test -f server.json || (echo "server.json missing"; exit 1)
          cat server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

      - name: Verify publish
        run: |
          echo "Published. View at: https://registry.modelcontextprotocol.io/?search=askcyborg"
