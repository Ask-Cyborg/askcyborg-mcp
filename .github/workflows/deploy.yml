name: Deploy MCP Server to Cloudflare Workers

# Deploys the AskCyborg MCP server to Cloudflare Workers on every push to main.
#
# REQUIRES two repo secrets — once set, deploys are automatic:
#   CLOUDFLARE_API_TOKEN    — Workers Scripts:Edit + Account:Read
#                              Create at: https://dash.cloudflare.com/profile/api-tokens
#                              Use template "Edit Cloudflare Workers" and scope to
#                              the AskCyborg account.
#   CLOUDFLARE_ACCOUNT_ID   — 64e88725aa8e331555cc09837bf52b6e (AskCyborg account)
#
# Until both are set, this workflow gracefully skips (no error).
#
# Cloudflare Workers Builds (the dashboard-managed CI) is ALSO configured for
# this repo — when working, that auto-deploys without needing these secrets.
# This workflow is a backup path in case Workers Builds doesn't fire.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gracefully skip when secrets aren't set
    if: ${{ vars.HAS_CLOUDFLARE_SECRETS == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Smoke test deployed endpoint
        run: |
          set -euo pipefail
          sleep 10
          curl -sf "https://askcyborg-mcp.${{ vars.CLOUDFLARE_SUBDOMAIN || 'steve-64e' }}.workers.dev/health" \
            | grep -q "askcyborg-mcp"
          curl -sf -X POST "https://askcyborg-mcp.${{ vars.CLOUDFLARE_SUBDOMAIN || 'steve-64e' }}.workers.dev/mcp" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
            | grep -q '"search_companies"'
          echo "✓ deploy verified"

  skipped-no-secrets:
    runs-on: ubuntu-latest
    if: ${{ vars.HAS_CLOUDFLARE_SECRETS != 'true' }}
    steps:
      - name: Note
        run: |
          echo "::notice title=Deploy skipped::Cloudflare deploy secrets not set. To enable:"
          echo "::notice::  1. Create token at https://dash.cloudflare.com/profile/api-tokens (Edit Cloudflare Workers template)"
          echo "::notice::  2. gh secret set CLOUDFLARE_API_TOKEN"
          echo "::notice::  3. gh secret set CLOUDFLARE_ACCOUNT_ID"
          echo "::notice::  4. gh variable set HAS_CLOUDFLARE_SECRETS --body true"
          echo "::notice::Until then, Cloudflare Workers Builds (managed by the dashboard) is the primary deploy path."
